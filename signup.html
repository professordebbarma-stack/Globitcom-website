<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
<h1>Create Account</h1>

<input type="text" id="newUser" placeholder="Username"><br><br>
<input type="password" id="newPass" placeholder="Password"><br><br>

<button onclick="signup()">Signup</button>

<p id="msg"></p>
</section>

<script>
function signup(){
    let user = document.getElementById("newUser").value;
    let pass = document.getElementById("newPass").value;

    if(user === "" || pass === ""){
        document.getElementById("msg").innerText = "Please fill all fields";
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    document.getElementById("msg").innerText = "Signup successful! Redirecting...";

    // 👉 Redirect after 1.5 seconds
    setTimeout(function(){
        window.location.href = "login.html";
    }, 1500);
}
</script>

</body>
</html>
